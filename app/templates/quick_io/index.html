<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>快速出入庫 | {{ admin_title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --accent:      #5c7cfa;
      --accent-dark: #3a5bd9;
      --topbar-h:    52px;
      --panel-w:     360px;
    }
    @media (min-width: 1100px) { :root { --panel-w: 400px; } }
    @media (max-width: 820px)  { :root { --panel-w: 300px; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }
    body {
      background: #eef0f5; font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100%; overflow: hidden; font-size: 14px;
      overscroll-behavior: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    }

    /* ══ Portrait lock（直立時提示旋轉） ══ */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #1e2235; color: #fff;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #rotate-hint i { font-size: 3rem; animation: rotateAnim 1.2s ease-in-out infinite alternate; }
    @keyframes rotateAnim {
      from { transform: rotate(0deg); } to { transform: rotate(-90deg); }
    }
    @media (orientation: portrait) { #rotate-hint { display: flex; } }

    /* ══ App shell ══ */
    #app {
      position: absolute; top: 0; left: 0; right: 0;
      height: var(--viewport-h, 100vh);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ══ Topbar ══ */
    #topbar {
      height: var(--topbar-h);
      background: #1e2235;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; flex-shrink: 0; color: #fff;
    }
    .tb-logo { font-weight: 700; font-size: 1rem; white-space: nowrap;
               color: #fff; display: flex; align-items: center; gap: 6px; }
    .tb-logo i { color: #ffc107; font-size: 1.2rem; }
    #topbar-user { font-size: .82rem; color: #94a3b8; white-space: nowrap; }
    .tb-sep { width: 1px; height: 22px; background: #3d4566; flex-shrink: 0; }
    .tb-btn {
      background: #2c3148; border: 1px solid #3d4566; color: #cbd5e1;
      border-radius: 7px; padding: 5px 10px; font-size: .78rem; cursor: pointer;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
      transition: background .15s;
    }
    .tb-btn:hover { background: #3a4060; }

    /* ══ Main ══ */
    #main { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ══ Left: Product area ══ */
    #panel-products {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden; background: #eef0f5;
    }
    #product-toolbar {
      padding: 10px 14px; display: flex; gap: 10px; align-items: center;
      flex-shrink: 0;
    }
    #prod-search-wrap { flex: 1; position: relative; }
    #prod-search-wrap i {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: #9ca3af; font-size: .9rem; pointer-events: none;
    }
    #prod-search {
      width: 100%; padding: 6px 10px 6px 30px;
      border: 1.5px solid #dde2ef; border-radius: 9px;
      background: #fff; font-size: .88rem; color: #374151;
      outline: none; transition: border-color .15s;
    }
    #prod-search:focus { border-color: var(--accent); }

    #cat-bar {
      display: flex; gap: 8px; padding: 0 14px 10px;
      overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    }
    #cat-bar::-webkit-scrollbar { display: none; }
    .cat-tab {
      white-space: nowrap; font-size: .8rem; font-weight: 600;
      padding: 5px 14px; border-radius: 20px; cursor: pointer;
      border: 1.5px solid #dde2ef; background: #fff; color: #6b7280;
      transition: .15s; flex-shrink: 0;
    }
    .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    #product-grid {
      flex: 1; min-height: 0; overflow-y: auto; padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      grid-auto-rows: auto; gap: 10px; align-content: start;
      touch-action: pan-y; overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #product-grid::-webkit-scrollbar { width: 5px; }
    #product-grid::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    .prod-card {
      background: #fff; border: 2px solid #edf0f7; border-radius: 12px;
      padding: 12px 8px 10px; text-align: center; cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      user-select: none; -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .prod-card:hover  { border-color: var(--accent); box-shadow: 0 2px 12px rgba(92,124,250,.15); }
    .prod-card:active { transform: scale(.95); }
    .prod-card.selected { border-color: var(--accent); background: #f0f4ff; }

    .pc-icon { display: none; }
    .pc-name {
      font-size: 1rem; font-weight: 700; line-height: 1.35; color: #1e2235;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pc-sku  { font-size: .72rem; color: #9ca3af; margin-top: 4px; }
    .pc-qty-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--accent); color: #fff;
      border-radius: 10px; font-size: .65rem; font-weight: 700;
      padding: 1px 6px; line-height: 1.4;
    }

    /* ══ Right: Form panel ══
       Flex column：spacer（flex:1）讓品項清單靠底，
       不管品項多少，頁尾永遠固定在底部。
    ══ */
    #panel-form {
      flex: 0 0 var(--panel-w);
      display: flex; flex-direction: column;
      overflow: hidden; background: #fff;
      border-left: 1px solid #e8eaf0;
    }
    #form-header {
      flex-shrink: 0;
      padding: 12px 16px; border-bottom: 1px solid #edf0f7;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff;
    }
    #form-header h6 { font-size: .92rem; font-weight: 700; color: #1e2235; margin: 0; }
    #item-count {
      background: var(--accent); color: #fff; border-radius: 20px;
      font-size: .72rem; font-weight: 700; padding: 1px 8px; margin-left: 6px; display: none;
    }

    /* spacer（空狀態）＋品項清單：同 POS cart 的 flex spacer 方式 */
    #items-empty {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #9ca3af; gap: 8px;
      font-size: .88rem; overflow: hidden;
    }
    #items-empty.hidden { visibility: hidden; }
    #items-empty i { font-size: 2.5rem; opacity: .35; }

    #items-list {
      flex: 0 1 auto; min-height: 0;
      overflow-y: auto; padding: 0 12px;
      touch-action: pan-y; overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #items-list::-webkit-scrollbar { width: 4px; }
    #items-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    .item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6;
    }
    .item-row:last-child { border-bottom: none; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: .85rem; font-weight: 600; color: #1e2235;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sku  { font-size: .7rem; color: #9ca3af; }
    .item-qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1.5px solid #e2e8f0; background: #f8f9fb;
      font-size: .95rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: #374151; transition: .1s; font-weight: 600;
    }
    .qty-btn:hover { background: #e8eaf0; border-color: #c9cdd8; }
    .qty-val { min-width: 28px; text-align: center; font-weight: 700; font-size: .88rem; }
    .item-del { color: #d1d5db; cursor: pointer; font-size: 1rem; padding: 4px;
                border-radius: 6px; transition: color .1s; flex-shrink: 0; }
    .item-del:hover { color: #ef4444; background: #fef2f2; }

    /* ══ Form footer ══ */
    #form-footer {
      flex-shrink: 0;
      padding: 12px 16px; border-top: 2px solid #f3f4f6;
      background: #fff; box-shadow: 0 -4px 16px rgba(0,0,0,.06);
      display: flex; flex-direction: column; gap: 10px;
    }

    /* 操作類型 */
    .type-group { display: flex; gap: 6px; }
    .type-btn {
      flex: 1; padding: 7px 0; font-size: .82rem; font-weight: 600;
      border-radius: 8px; border: 1.5px solid #dde2ef;
      background: #f8f9fb; color: #6b7280; cursor: pointer;
      transition: .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .type-btn:hover { border-color: var(--accent); color: var(--accent); }
    .type-btn.active-in  { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .type-btn.active-out { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
    .type-btn.active-con { background: #fef3c7; border-color: #f59e0b; color: #78350f; }

    /* 倉庫 / 備註 */
    .ff-row { display: flex; flex-direction: column; gap: 3px; }
    .ff-label { font-size: .73rem; font-weight: 700; color: #6b7280; letter-spacing: .3px; }
    .ff-row select, .ff-row input {
      font-size: .9rem; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 6px 10px; outline: none; transition: border-color .15s; width: 100%;
    }
    .ff-row select:focus, .ff-row input:focus { border-color: var(--accent); }

    #btn-submit {
      width: 100%; padding: 12px; font-size: 1rem; font-weight: 800;
      border-radius: 10px; background: var(--accent); color: #fff; border: none;
      cursor: pointer; transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #btn-submit:hover  { background: var(--accent-dark); }
    #btn-submit:active { transform: scale(.98); }
    #btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }

    /* ══ Login overlay ══ */
    #login-overlay { position: fixed; inset: 0; background: #eef0f5; z-index: 9999;
                     display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 36px 32px;
                  width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.12); }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo i { font-size: 2.4rem; color: var(--accent); }
    .login-logo h5 { margin: 8px 0 0; font-weight: 700; color: #1e2235; }

    /* ══ Toast ══ */
    #toast-wrap { position: fixed; top: 70px; right: 16px; z-index: 9999;
                  display: flex; flex-direction: column; gap: 8px; }
    .toast-msg  { background: #1e2235; color: #fff; padding: 10px 16px; border-radius: 10px;
                  font-size: .84rem; box-shadow: 0 4px 16px rgba(0,0,0,.25);
                  animation: toastIn .2s ease; max-width: 300px; }
    .toast-msg.success { background: #15803d; }
    .toast-msg.danger  { background: #b91c1c; }
    @keyframes toastIn { from{ opacity:0; transform:translateX(20px) } to{ opacity:1; transform:none } }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* ══ 品項數量直接輸入 ══ */
    .qty-val-input {
      width: 34px; text-align: center; font-weight: 700; font-size: .88rem;
      border: none; background: transparent; padding: 0; color: #111827;
      -moz-appearance: textfield; cursor: text;
    }
    .qty-val-input::-webkit-outer-spin-button,
    .qty-val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .qty-val-input:focus {
      outline: 2px solid var(--accent); border-radius: 5px; background: #fff; width: 42px;
    }
    /* ══ 數量輸入 Overlay ══ */
    #qty-overlay {
      display: none; position: fixed; inset: 0; z-index: 1070;
      background: rgba(0,0,0,.5); align-items: center; justify-content: center;
    }
    #qty-overlay.show { display: flex; }
    #qty-overlay-box {
      background: #fff; border-radius: 16px; padding: 24px 20px 20px;
      width: 260px; max-width: 90vw; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    #qty-overlay-name {
      font-size: .95rem; font-weight: 700; color: #1e2235;
      margin-bottom: 14px; word-break: break-all;
    }
    #qty-overlay-input {
      font-size: 2.2rem; font-weight: 800; text-align: center;
      border: 2px solid #e2e8f0; border-radius: 10px; padding: 4px 8px;
      width: 100%; color: var(--accent); margin-bottom: 16px;
      -moz-appearance: textfield;
    }
    #qty-overlay-input::-webkit-outer-spin-button,
    #qty-overlay-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #qty-overlay-input:focus { outline: none; border-color: var(--accent); }
    /* ══ 觸控裝置下拉選單字體修正 ══ */
    @media (pointer: coarse) {
      select, select option { font-size: 16px !important; }
    }
  </style>
</head>
<body>

<!-- 直立旋轉提示 -->
<div id="rotate-hint">
  <i class="bi bi-phone-landscape"></i>
  <div style="font-size:1.1rem;font-weight:600">請旋轉裝置為橫向使用</div>
  <div style="font-size:.85rem;color:#94a3b8;margin-top:4px">快速出入庫系統需要橫向模式</div>
</div>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-lightning-charge-fill"></i>
      <h5>快速出入庫</h5>
    </div>
    <div style="margin-bottom:14px">
      <input id="login-user" type="text" class="form-control" placeholder="帳號" autocomplete="username"/>
    </div>
    <div style="margin-bottom:12px">
      <input id="login-pass" type="password" class="form-control" placeholder="密碼" autocomplete="current-password"/>
    </div>
    <div style="margin-bottom:16px">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="chk-remember" checked/>
        <label class="form-check-label small text-muted" for="chk-remember">記住我（30 天免登入）</label>
      </div>
    </div>
    <button id="btn-login" class="btn btn-primary w-100 py-2 fw-bold">
      <i class="bi bi-box-arrow-in-right me-1"></i>登入
    </button>
    <div id="login-err" class="text-danger small mt-2 text-center"></div>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">

  <!-- Topbar -->
  <div id="topbar">
    <div class="tb-logo"><i class="bi bi-lightning-charge-fill"></i>快速出入庫</div>
    <div class="tb-sep"></div>
    <span id="topbar-user"></span>
    <div style="flex:1"></div>
    <button class="tb-btn" onclick="doLogout()">
      <i class="bi bi-box-arrow-right"></i>登出
    </button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Left: 物料選擇 -->
    <div id="panel-products">
      <div id="product-toolbar">
        <div id="prod-search-wrap">
          <i class="bi bi-search"></i>
          <input id="prod-search" type="text" placeholder="搜尋物料名稱 / SKU…" oninput="renderProducts()"/>
        </div>
      </div>
      <div id="cat-bar">
        <span class="cat-tab active" data-cat="" onclick="selectCat(this)">全部</span>
      </div>
      <div id="product-grid"></div>
    </div>

    <!-- Right: 出入庫面板 -->
    <div id="panel-form">

      <div id="form-header">
        <div>
          <h6 style="display:inline"><i class="bi bi-clipboard-plus me-1"></i>出入庫單</h6>
          <span id="item-count">0</span>
        </div>
        <button class="tb-btn" onclick="clearItems()" style="padding:4px 10px;font-size:.75rem">
          <i class="bi bi-trash"></i>清空
        </button>
      </div>

      <!-- spacer（flex:1） + 品項清單（靠底） -->
      <div id="items-empty">
        <i class="bi bi-inbox"></i>
        <span>點選左方物料加入</span>
      </div>
      <div id="items-list"></div>

      <div id="form-footer">
        <!-- 操作類型 -->
        <div class="type-group">
          <button class="type-btn active-in" data-type="inbound" onclick="setType('inbound')">
            <i class="bi bi-box-arrow-in-down"></i>入庫
          </button>
          <button class="type-btn" data-type="outbound" onclick="setType('outbound')">
            <i class="bi bi-box-arrow-up"></i>出庫
          </button>
          <button class="type-btn" data-type="consume" onclick="setType('consume')">
            <i class="bi bi-fire"></i>消耗
          </button>
        </div>
        <!-- 倉庫 -->
        <div class="ff-row">
          <span class="ff-label">倉庫</span>
          <select id="qio-warehouse">
            <option value="">請選擇倉庫…</option>
          </select>
        </div>
        <!-- 備註 -->
        <div class="ff-row">
          <span class="ff-label">備註（選填）</span>
          <input id="qio-remark" type="text" placeholder="例：廠商進貨、現場消耗…"/>
        </div>
        <!-- 送出 -->
        <button id="btn-submit" onclick="submitQIO()">
          <i class="bi bi-check-circle-fill" style="font-size:1.1rem"></i>送出
        </button>
      </div>

    </div><!-- /panel-form -->

  </div><!-- /main -->
</div><!-- /app -->

<div id="toast-wrap"></div>

<!-- Qty Input Overlay -->
<div id="qty-overlay" onclick="if(event.target===this)closeQtyOverlay()">
  <div id="qty-overlay-box">
    <div id="qty-overlay-name"></div>
    <input id="qty-overlay-input" type="number" inputmode="numeric" min="1" step="1" value="1"
           onkeydown="if(event.key==='Enter'){event.preventDefault();confirmQtyOverlay()}else if(event.key==='Escape'){closeQtyOverlay()}" />
    <div class="d-flex gap-2">
      <button class="btn btn-secondary flex-fill" onclick="closeQtyOverlay()">取消</button>
      <button class="btn btn-primary flex-fill fw-semibold" onclick="confirmQtyOverlay()">
        <i class="bi bi-plus-lg me-1"></i>加入
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ──────────────────────────────────────────
//  Viewport height fix (iOS Safari)
// ──────────────────────────────────────────
(function() {
  const set = () =>
    document.documentElement.style.setProperty('--viewport-h', window.innerHeight + 'px');
  set();
  window.addEventListener('resize', set, { passive: true });
})();

// ──────────────────────────────────────────
//  State
// ──────────────────────────────────────────
let TOKEN         = localStorage.getItem('qio_token')         || localStorage.getItem('wms_token') || '';
let REFRESH_TOKEN = localStorage.getItem('qio_refresh_token') || localStorage.getItem('wms_refresh_token') || '';
let CURRENT_USER  = localStorage.getItem('qio_user')          || localStorage.getItem('wms_user')  || '';

let ALL_WAREHOUSES = [];
let ALL_PRODUCTS   = [];
let ITEMS          = [];   // [{ product: {...}, qty: N }]
let _type = 'inbound';
let _cat  = '';

// ══ 數量輸入 Overlay ══════════════════════
let _qtyOverlayCallback = null;

function openQtyOverlay(name, callback) {
  _qtyOverlayCallback = callback;
  document.getElementById('qty-overlay-name').textContent = name;
  const inp = document.getElementById('qty-overlay-input');
  inp.value = 1;
  document.getElementById('qty-overlay').classList.add('show');
  setTimeout(() => { inp.select(); inp.focus(); }, 60);
}

function closeQtyOverlay() {
  document.getElementById('qty-overlay').classList.remove('show');
  _qtyOverlayCallback = null;
}

function confirmQtyOverlay() {
  const qty = Math.max(1, parseInt(document.getElementById('qty-overlay-input').value) || 1);
  const cb  = _qtyOverlayCallback;
  closeQtyOverlay();
  if (cb) cb(qty);
}

// ──────────────────────────────────────────
//  API helper（自動 refresh token）
// ──────────────────────────────────────────
async function api(method, path, body, _retry = false) {
  const opts = { method, headers: { Authorization: `Bearer ${TOKEN}` } };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  try {
    const res  = await fetch(path, opts);
    if (res.status === 401 && REFRESH_TOKEN && !_retry) {
      const ok = await _tryRefresh();
      if (ok) return api(method, path, body, true);
      doLogout(); return { ok: false, status: 401, data: {} };
    }
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, status: 0, data: {} };
  }
}

async function _tryRefresh() {
  try {
    const r = await fetch('/auth/refresh', {
      method: 'POST', headers: { Authorization: `Bearer ${REFRESH_TOKEN}` },
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.token) {
      TOKEN = j.token;
      localStorage.setItem('qio_token', TOKEN);
      return true;
    }
  } catch (_) {}
  REFRESH_TOKEN = '';
  localStorage.removeItem('qio_refresh_token');
  return false;
}

// ──────────────────────────────────────────
//  Login / Logout
// ──────────────────────────────────────────
async function doLogin() {
  const u       = document.getElementById('login-user').value.trim();
  const p       = document.getElementById('login-pass').value;
  const remember = document.getElementById('chk-remember').checked;
  const errEl   = document.getElementById('login-err');
  if (!u || !p) { errEl.textContent = '請輸入帳號與密碼'; return; }
  errEl.textContent = '';

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>登入中…';

  const r = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p, remember_me: remember }),
  }).catch(() => null);

  btn.disabled = false;
  btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>登入';

  if (!r || !r.ok) {
    const j = r ? await r.json().catch(() => ({})) : {};
    errEl.textContent = j.message || '登入失敗'; return;
  }
  const j = await r.json().catch(() => ({}));
  if (!j.token) { errEl.textContent = j.message || '登入失敗'; return; }

  TOKEN        = j.token;
  CURRENT_USER = u;
  localStorage.setItem('qio_token', TOKEN);
  localStorage.setItem('qio_user',  CURRENT_USER);
  if (j.refresh_token) {
    REFRESH_TOKEN = j.refresh_token;
    localStorage.setItem('qio_refresh_token', REFRESH_TOKEN);
  }
  await bootApp();
}

function doLogout() {
  TOKEN = ''; REFRESH_TOKEN = ''; CURRENT_USER = '';
  ['qio_token', 'qio_refresh_token', 'qio_user'].forEach(k => localStorage.removeItem(k));
  location.reload();
}

// ──────────────────────────────────────────
//  Boot
// ──────────────────────────────────────────
async function bootApp() {
  const me = await api('GET', '/auth/me');
  if (!me.ok) { doLogout(); return; }
  CURRENT_USER = me.data.username || CURRENT_USER;
  document.getElementById('topbar-user').textContent = `👤 ${CURRENT_USER}`;

  await Promise.all([loadWarehouses(), loadProducts()]);
  populateWarehouseSelect();
  await applyDefaultWarehouse();

  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display           = 'flex';
  renderProducts();
  renderItems();
}

async function loadWarehouses() {
  const r = await api('GET', '/warehouse/');
  if (r.ok) ALL_WAREHOUSES = r.data.data || [];
}

async function loadProducts() {
  const r = await api('GET', '/product/');
  if (r.ok) {
    ALL_PRODUCTS = r.data.data || [];
    buildCatBar();
  }
}

function buildCatBar() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))];
  const bar  = document.getElementById('cat-bar');
  bar.innerHTML = '<span class="cat-tab active" data-cat="" onclick="selectCat(this)">全部</span>';
  cats.forEach(c => bar.insertAdjacentHTML('beforeend',
    `<span class="cat-tab" data-cat="${c}" onclick="selectCat(this)">${c}</span>`));
}

function selectCat(el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _cat = el.dataset.cat;
  renderProducts();
}

function populateWarehouseSelect() {
  const el  = document.getElementById('qio-warehouse');
  const cur = el.value;
  el.innerHTML = '<option value="">請選擇倉庫…</option>';
  ALL_WAREHOUSES.forEach(w =>
    el.insertAdjacentHTML('beforeend', `<option value="${w._id}">${w.name}</option>`));
  if (cur) el.value = cur;
}

async function applyDefaultWarehouse() {
  const r = await api('GET', '/settings/');
  if (!r.ok) return;
  const wid = r.data.data?.default_warehouse_id;
  if (wid) document.getElementById('qio-warehouse').value = wid;
}

// ──────────────────────────────────────────
//  Product grid
// ──────────────────────────────────────────
function renderProducts() {
  const q    = (document.getElementById('prod-search')?.value || '').trim().toLowerCase();
  let prods  = ALL_PRODUCTS;
  if (_cat) prods = prods.filter(p => p.category === _cat);
  if (q)    prods = prods.filter(p =>
    p.name.toLowerCase().includes(q) || (p.sku || '').toLowerCase().includes(q));

  const grid = document.getElementById('product-grid');
  if (!prods.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;
      color:#9ca3af;padding:32px 0;font-size:.88rem">沒有符合的物料</div>`;
    return;
  }
  grid.innerHTML = prods.map(p => {
    const entry   = ITEMS.find(i => i.product._id === p._id);
    const badge   = entry ? `<span class="pc-qty-badge">${entry.qty}</span>` : '';
    const selCls  = entry ? ' selected' : '';
    return `
    <div class="prod-card${selCls}" onclick="addProduct('${p._id}')">
      ${badge}
      <div class="pc-name">${p.name}</div>
      <div class="pc-sku">${p.sku || ''}</div>
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────
//  Items management
// ──────────────────────────────────────────
function addProduct(id) {
  const prod = ALL_PRODUCTS.find(p => p._id === id);
  if (!prod) return;
  openQtyOverlay(prod.name, qty => {
    const entry = ITEMS.find(i => i.product._id === id);
    if (entry) { entry.qty += qty; }
    else { ITEMS.push({ product: prod, qty }); }
    renderItems();
    renderProducts();
  });
}

function changeQty(id, delta) {
  const entry = ITEMS.find(i => i.product._id === id);
  if (!entry) return;
  entry.qty = Math.max(1, entry.qty + delta);
  renderItems();
  renderProducts();
}

function setQty(id, val) {
  const qty = Math.max(1, parseInt(val) || 1);
  const entry = ITEMS.find(i => i.product._id === id);
  if (!entry) return;
  entry.qty = qty;
  renderItems();
  renderProducts();
}

function removeItem(id) {
  ITEMS = ITEMS.filter(i => i.product._id !== id);
  renderItems();
  renderProducts();
}

function clearItems() {
  ITEMS = [];
  renderItems();
  renderProducts();
}

function renderItems() {
  const list  = document.getElementById('items-list');
  const empty = document.getElementById('items-empty');
  const badge = document.getElementById('item-count');
  if (!list) return;

  const total = ITEMS.reduce((s, i) => s + i.qty, 0);
  badge.textContent  = total;
  badge.style.display = ITEMS.length ? 'inline' : 'none';

  if (!ITEMS.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML = ITEMS.map(({ product: p, qty }) => `
    <div class="item-row">
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-sku">${[p.sku, p.unit ? '· ' + p.unit : ''].filter(Boolean).join(' ')}</div>
      </div>
      <div class="item-qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${p._id}',-1)">−</button>
        <input type="number" inputmode="numeric" class="qty-val-input"
               value="${qty}" min="1"
               onclick="this.select()"
               onchange="setQty('${p._id}',this.value)"
               onkeydown="if(event.key==='Enter'){this.blur()}" />
        <button class="qty-btn" onclick="changeQty('${p._id}',1)">+</button>
      </div>
      <span class="item-del" onclick="removeItem('${p._id}')"><i class="bi bi-x-lg"></i></span>
    </div>`).join('');
}

// ──────────────────────────────────────────
//  Type selector
// ──────────────────────────────────────────
function setType(type) {
  _type = type;
  document.querySelectorAll('.type-btn').forEach(b =>
    b.classList.remove('active-in', 'active-out', 'active-con'));
  const cls = { inbound: 'active-in', outbound: 'active-out', consume: 'active-con' }[type];
  document.querySelector(`.type-btn[data-type="${type}"]`)?.classList.add(cls);
}

// ──────────────────────────────────────────
//  Submit
// ──────────────────────────────────────────
async function submitQIO() {
  const warehouse_id = document.getElementById('qio-warehouse').value;
  if (!warehouse_id) { toast('請先選擇倉庫', 'danger'); return; }
  if (!ITEMS.length)  { toast('請先選擇品項', 'danger'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>送出中…';

  const r = await api('POST', '/inventory/batch', {
    type:         _type,
    warehouse_id,
    remark:       document.getElementById('qio-remark').value.trim(),
    items:        ITEMS.map(({ product: p, qty }) => ({ product_id: p._id, qty })),
  });

  btn.disabled = false;
  btn.innerHTML = '<i class="bi bi-check-circle-fill" style="font-size:1.1rem"></i>送出';

  if (r.ok) {
    toast(r.data.message || '送出成功', 'success');
    if (r.data.errors?.length) r.data.errors.forEach(e => toast(e, 'danger'));
    ITEMS = [];
    document.getElementById('qio-remark').value = '';
    renderItems();
    renderProducts();
    await applyDefaultWarehouse();
  } else {
    toast(r.data.message || '送出失敗', 'danger');
  }
}

// ──────────────────────────────────────────
//  Toast
// ──────────────────────────────────────────
function toast(msg, type = 'info', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast-msg${type !== 'info' ? ' ' + type : ''}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ──────────────────────────────────────────
//  Event bindings
// ──────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ──────────────────────────────────────────
//  Init
// ──────────────────────────────────────────
(async () => {
  if (TOKEN) {
    await bootApp();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
    if (CURRENT_USER) document.getElementById('login-user').value = CURRENT_USER;
  }
})();
</script>
</body>
</html>
