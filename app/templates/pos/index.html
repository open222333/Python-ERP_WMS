<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="screen-orientation" content="landscape"/>
  <link rel="manifest" href="/pos/manifest.json"/>
  <title>POS 收銀 | {{ admin_title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --accent: #4f6ef7;
      --accent-dark: #3a56d4;
      --topbar-h: 56px;
      --cart-w: 360px;
    }
    @media (min-width: 1100px) { :root { --cart-w: 400px; } }
    @media (max-width: 820px)  { :root { --cart-w: 300px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }
    body { background: #eef0f5; font-family: 'Segoe UI', system-ui, sans-serif;
           height: 100%; overflow: hidden; font-size: 14px;
           overscroll-behavior: none;  /* 阻止 pull-to-refresh 與 bounce */
           position: fixed;            /* iOS Safari 額外鎖定，阻止頁面滾動 */
           top: 0; left: 0; right: 0; bottom: 0;
           /* ⚠️ 不設 touch-action:none — 祖先的 none 會覆蓋子元素的 pan-y，
               導致 #product-grid/#cart-items 的觸控滾動完全失效。
               子元素自行宣告 touch-action:pan-y 即可。               */
         }

    /* ══ Layout ══
       #app 用 position:absolute + inset:0 取得視口的「具體像素尺寸」，
       再透過 flex:1 + min-height:0 鏈路向下傳遞，確保所有可滾動元素能正確計算高度。
       完全不使用 dvh（iOS Safari 15.4 以下不支援）或 height:100%（flex 子元素有相容問題）。
    ══ */
    #app {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* bottom:0 錨定底部，避免 iOS Safari 工具列高度導致 --viewport-h 算錯時版面跑掉
         --viewport-h 仍由 JS 設定（visualViewport），作為 max-height 的 fallback 參考 */
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #main {
      flex: 1; min-height: 0;
      display: flex; overflow: hidden; gap: 0;
    }

    /* ══ Topbar ══ */
    #topbar {
      height: var(--topbar-h);
      background: #1e2235;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; flex-shrink: 0;
      color: #fff;
    }
    #topbar .tb-logo { font-weight: 700; font-size: 1rem; letter-spacing: .5px;
                       white-space: nowrap; color: #fff; display: flex; align-items: center; gap: 6px; }
    #topbar .tb-logo i { color: #7c9cff; font-size: 1.2rem; }
    #topbar select.form-select { background: #2c3148; border-color: #3d4566; color: #e2e8f0;
                                  font-size: .82rem; padding: 4px 28px 4px 8px; }
    #topbar select.form-select:focus { box-shadow: none; border-color: var(--accent); }
    #scan-bar { flex: 0 0 220px; position: relative; }
    #scan-bar input { background: #2c3148; border: 1px solid #3d4566; color: #e2e8f0;
                      border-radius: 8px; padding: 5px 10px 5px 32px; width: 100%; font-size: .82rem; }
    #scan-bar input::placeholder { color: #6b7280; }
    #scan-bar input:focus { outline: none; border-color: var(--accent); background: #323856; }
    #scan-bar .scan-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
                           color: #6b7280; font-size: .9rem; pointer-events: none; }
    #topbar-clock { font-size: .82rem; color: #94a3b8; white-space: nowrap; min-width: 60px; text-align: right; }
    #topbar-user  { font-size: .82rem; color: #94a3b8; white-space: nowrap; }
    .tb-btn { background: #2c3148; border: 1px solid #3d4566; color: #cbd5e1;
              border-radius: 7px; padding: 5px 10px; font-size: .78rem; cursor: pointer;
              display: flex; align-items: center; gap: 5px; white-space: nowrap;
              transition: background .15s; }
    .tb-btn:hover { background: #3a4060; }
    .tb-btn.danger { border-color: #7f1d1d; color: #fca5a5; }
    .tb-btn.danger:hover { background: #7f1d1d; }
    .tb-sep { width: 1px; height: 24px; background: #3d4566; flex-shrink: 0; }

    /* ══ Product panel ══ */
    #panel-products {
      /* CSS Grid: 工具列(auto) + 商品格(1fr)。
         1fr 列永遠是明確像素高度，不依賴 flex stretch 傳遞。 */
      display: grid;
      grid-template-rows: auto 1fr;
      flex: 1; min-height: 0; overflow: hidden;
      background: #f5f6fa;
    }
    #product-toolbar {
      padding: 10px 14px; background: #fff;
      border-bottom: 1px solid #e8eaf0;
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    #prod-search-wrap { position: relative; flex: 1; }
    #prod-search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
                          color: #9ca3af; font-size: .85rem; pointer-events: none; }
    #prod-search { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px;
                   padding: 7px 10px 7px 30px; font-size: .85rem; background: #f8f9fb; }
    #prod-search:focus { outline: none; border-color: var(--accent); background: #fff; }
    #prod-cat { border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 10px;
                font-size: .85rem; background: #f8f9fb; min-width: 110px; max-width: 150px; }
    #prod-cat:focus { outline: none; border-color: var(--accent); }

    /* Category tabs */
    #cat-tabs { display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto; flex-shrink: 0;
                touch-action: pan-x; overscroll-behavior: contain;
                background: #fff; border-bottom: 1px solid #e8eaf0; }
    #cat-tabs::-webkit-scrollbar { height: 3px; }
    #cat-tabs::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    .cat-tab { padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 600;
               cursor: pointer; white-space: nowrap; border: 1.5px solid #e2e8f0;
               background: #f8f9fb; color: #6b7280; transition: .15s; user-select: none; }
    .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    #product-grid {
      flex: 1; min-height: 0; overflow-y: auto; padding: 14px;
      display: grid;
      /* auto-fit：空白 track 自動收縮，不留右側空欄 */
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      /* 當品項不足一行時，靠左對齊並限制最大欄寬，避免卡片過寬 */
      grid-auto-rows: auto;
      gap: 10px;
      align-content: start;
      touch-action: pan-y;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #product-grid::-webkit-scrollbar { width: 5px; }
    #product-grid::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    .prod-card {
      background: #fff; border: 2px solid #edf0f7; border-radius: 12px;
      padding: 14px 10px 12px; text-align: center; cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .prod-card:hover  { border-color: var(--accent); box-shadow: 0 2px 12px rgba(79,110,247,.15); }
    .prod-card:active { transform: scale(.95); }
    .pc-name  { font-size: 1rem; font-weight: 700; line-height: 1.35; color: #1e2235;
                display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .pc-sku   { font-size: .72rem; color: #9ca3af; margin-top: 4px; }
    .pc-price { font-size: 1rem; font-weight: 800; color: var(--accent); margin-top: 6px; }

    /* ══ Cart panel — CSS Grid 三列：標題(auto) / 明細(1fr) / 結帳區(auto) ══
       grid-template-rows: auto 1fr auto 讓結帳區永遠固定在底部，
       1fr 列具有明確像素高度，overflow-y:auto 可以正確啟用滾動。
    ══ */
    #panel-cart {
      flex: 0 0 var(--cart-w);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-left: 1px solid #e8eaf0;
    }
    #cart-header {
      flex-shrink: 0;
      padding: 12px 16px; border-bottom: 1px solid #edf0f7;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff;
    }
    #cart-header h6 { font-size: .92rem; font-weight: 700; color: #1e2235; margin: 0; }
    #cart-count { background: var(--accent); color: #fff; border-radius: 20px;
                  font-size: .72rem; font-weight: 700; padding: 1px 8px; margin-left: 6px; }

    /* cart-empty 作為 flex spacer：有品項時 visibility:hidden 保留排版空間（空白移到品項上方），
       空購物車時顯示提示。品項永遠緊鄰結帳頁尾，不會在兩者之間留下空白。 */
    #cart-empty {
      flex: 1;              /* 永遠佔滿剩餘空間（spacer 角色） */
      min-height: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #9ca3af; gap: 8px;
      font-size: .88rem; overflow: hidden;
    }
    #cart-empty.hidden {
      visibility: hidden;   /* 隱藏內容但保留 flex:1 空間，空白移到品項上方 */
    }
    #cart-empty i { font-size: 2.5rem; opacity: .35; }

    #cart-items {
      flex: 0 1 auto;       /* 依內容高度縮放；品項多時可 shrink 並捲動 */
      min-height: 0;        /* 讓 flex-shrink 正確壓縮以啟用 overflow scroll */
      overflow-y: auto; padding: 0 12px;
      touch-action: pan-y; overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #cart-items::-webkit-scrollbar { width: 4px; }
    #cart-items::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    .cart-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #f3f4f6;
    }
    .cart-row:last-child { border-bottom: none; }
    .cart-info { flex: 1; min-width: 0; }
    .cart-name  { font-size: .85rem; font-weight: 600; color: #1e2235;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-sku   { font-size: .7rem; color: #9ca3af; }
    .cart-qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1.5px solid #e2e8f0; background: #f8f9fb;
      font-size: 1rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: #374151; transition: .1s; font-weight: 600;
    }
    .qty-btn:hover { background: #e8eaf0; border-color: #c9cdd8; }
    .qty-val { min-width: 28px; text-align: center; font-weight: 700; font-size: .88rem; }
    .cart-price { font-size: .88rem; font-weight: 800; color: var(--accent);
                  min-width: 64px; text-align: right; flex-shrink: 0; }
    .cart-del { color: #d1d5db; cursor: pointer; font-size: 1rem; padding: 4px;
                border-radius: 6px; transition: color .1s; flex-shrink: 0; }
    .cart-del:hover { color: #ef4444; background: #fef2f2; }
    .cart-cust { font-size: .68rem; color: #6b7280; margin-top: 2px; line-height: 1.4; }

    /* ══ Cart footer ══ */
    #cart-footer {
      flex-shrink: 0;    /* 永遠固定在底部（緊接 #cart-items 之後） */
      padding: 14px 16px; border-top: 2px solid #f3f4f6;
      background: #fff;
      box-shadow: 0 -4px 16px rgba(0,0,0,.06);
    }
    .cf-row { display: flex; justify-content: space-between; align-items: center;
              margin-bottom: 8px; }
    .cf-label { font-size: .83rem; color: #6b7280; }
    .cf-val   { font-size: .83rem; font-weight: 600; }
    #cf-total-row { padding: 10px 0 10px; border-top: 1.5px dashed #e2e8f0; margin-top: 4px; }
    #cf-total-lbl { font-size: 1rem; font-weight: 700; color: #1e2235; }
    #cf-total     { font-size: 1.6rem; font-weight: 900; color: var(--accent); line-height: 1; }
    #btn-checkout {
      width: 100%; padding: 14px; font-size: 1rem; font-weight: 800;
      border-radius: 12px; background: var(--accent); color: #fff; border: none;
      cursor: pointer; transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #btn-checkout:hover  { background: var(--accent-dark); }
    #btn-checkout:active { transform: scale(.98); }
    #btn-checkout:disabled { background: #9ca3af; cursor: not-allowed; }

    /* ══ Toast ══ */
    #toast-wrap { position: fixed; top: 70px; right: 16px; z-index: 9999;
                  display: flex; flex-direction: column; gap: 8px; }
    .toast-msg  { background: #1e2235; color: #fff; padding: 10px 16px; border-radius: 10px;
                  font-size: .84rem; box-shadow: 0 4px 16px rgba(0,0,0,.25);
                  animation: toastIn .2s ease; max-width: 300px; }
    .toast-msg.success { background: #15803d; }
    .toast-msg.danger  { background: #b91c1c; }
    @keyframes toastIn { from{ opacity:0; transform:translateX(20px) } to{ opacity:1; transform:none } }

    /* ══ Print ══ */
    @media print {
      body > *:not(#receipt-print) { display: none !important; }
      #receipt-print { display: block !important; font-family: monospace; font-size: 11pt; }
    }
    #receipt-print { display: none; }

    /* ══ Orientation lock ══ */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #1e2235; color: #fff;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #rotate-hint i { font-size: 3rem; animation: rotateAnim 1.2s ease-in-out infinite alternate; }
    @keyframes rotateAnim {
      from { transform: rotate(0deg); }
      to   { transform: rotate(90deg); }
    }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; }
    }

    /* ══ Login ══ */
    #login-overlay { position: fixed; inset: 0; background: #eef0f5; z-index: 9999;
                     display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 36px 32px;
                  width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.12); }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo i { font-size: 2.4rem; color: var(--accent); }
    .login-logo h5 { margin: 8px 0 0; font-weight: 700; color: #1e2235; }

    /* ══ Scrollbar global ══ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* ══ 觸控裝置下拉選單字體修正 ══ */
    @media (pointer: coarse) {
      select, select option { font-size: 16px !important; }
    }
  </style>
</head>
<body>

<!-- Rotate hint (portrait mode) -->
<div id="rotate-hint">
  <i class="bi bi-phone-landscape"></i>
  <div style="font-size:1.1rem;font-weight:600">請旋轉裝置為橫向使用</div>
  <div style="font-size:.85rem;color:#94a3b8">POS 收銀系統需要橫向模式</div>
</div>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-cash-register"></i>
      <h5>POS 收銀系統</h5>
    </div>
    <div style="margin-bottom:14px">
      <input id="login-user" type="text" class="form-control" placeholder="帳號" autocomplete="username"/>
    </div>
    <div style="margin-bottom:12px">
      <input id="login-pass" type="password" class="form-control" placeholder="密碼" autocomplete="current-password"/>
    </div>
    <div style="margin-bottom:16px">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="pos-remember" checked/>
        <label class="form-check-label small text-muted" for="pos-remember">記住我（30 天免登入）</label>
      </div>
    </div>
    <button class="btn btn-primary w-100 py-2 fw-bold" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-1"></i>登入
    </button>
    <div id="login-err" class="text-danger small mt-2 text-center"></div>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">

  <!-- Topbar -->
  <div id="topbar">
    <div class="tb-logo"><i class="bi bi-cash-register"></i>POS 收銀</div>
    <div class="tb-sep"></div>
    <select id="sel-warehouse" class="form-select" style="width:150px"></select>
    <select id="sel-menu" class="form-select" style="width:160px" onchange="onMenuChange()">
      <option value="">全部商品</option>
    </select>
    <div id="scan-bar">
      <i class="bi bi-upc-scan scan-icon"></i>
      <input id="scan-input" type="text" placeholder="掃描條碼…" autocomplete="off"/>
    </div>
    <div style="flex:1"></div>
    <span id="topbar-clock"></span>
    <div class="tb-sep"></div>
    <span id="topbar-user"></span>
    <button class="tb-btn" onclick="openSalesHistory()">
      <i class="bi bi-clock-history"></i>銷售記錄
    </button>
    <button class="tb-btn danger" onclick="doLogout()">
      <i class="bi bi-box-arrow-right"></i>登出
    </button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Left: Products -->
    <div id="panel-products">
      <div id="product-toolbar">
        <div id="prod-search-wrap">
          <i class="bi bi-search"></i>
          <input id="prod-search" type="text" placeholder="搜尋商品名稱 / SKU…" oninput="renderProducts()"/>
        </div>
        <select id="prod-cat" onchange="renderProducts()">
          <option value="">全部分類</option>
        </select>
      </div>
      <div id="product-grid"></div>
    </div>

    <!-- Right: Cart -->
    <div id="panel-cart">
      <div id="cart-header">
        <div>
          <h6 style="display:inline"><i class="bi bi-cart3 me-1"></i>購物車</h6>
          <span id="cart-count" style="display:none">0</span>
        </div>
        <button class="tb-btn danger" onclick="clearCart()" style="padding:4px 10px;font-size:.75rem">
          <i class="bi bi-trash"></i>清空
        </button>
      </div>

      <div id="cart-empty">
        <i class="bi bi-cart-x"></i>
        <span>購物車空空如也</span>
      </div>
      <div id="cart-items"></div>

      <div id="cart-footer">
        <div class="cf-row">
          <span class="cf-label">小計</span>
          <span class="cf-val" id="cf-subtotal">$0</span>
        </div>
        <div class="cf-row">
          <span class="cf-label">折扣</span>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="color:#9ca3af;font-size:.82rem">$</span>
            <input id="cf-discount" type="number" min="0" step="1" value="0" oninput="updateTotal()"
                   style="width:80px;border:1.5px solid #e2e8f0;border-radius:7px;
                          padding:4px 8px;text-align:right;font-size:.85rem;font-weight:600"/>
          </div>
        </div>
        <div class="cf-row" id="cf-total-row">
          <span id="cf-total-lbl">合計</span>
          <span id="cf-total">$0</span>
        </div>
        <button id="btn-checkout" onclick="openPayment()">
          <i class="bi bi-credit-card-2-front-fill" style="font-size:1.1rem"></i>
          結帳
        </button>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast-wrap"></div>

<!-- Receipt print area -->
<div id="receipt-print"></div>

<!-- Payment Modal -->
<div class="modal fade" id="modal-payment" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title"><i class="bi bi-credit-card me-1"></i>付款</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <div class="mb-3 text-center">
        <div class="text-muted small">應付金額</div>
        <div class="fs-2 fw-bold text-primary" id="pay-total">$0</div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">付款方式</label>
        <div class="d-flex flex-wrap gap-1" id="pay-type-btns">
          <!-- 動態產生 -->
        </div>
      </div>
      <div id="pay-cash-wrap" class="mb-2" style="display:none">
        <label class="form-label small fw-semibold">收現</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input id="pay-cash" type="number" class="form-control" min="0" step="1" value="0" oninput="calcChange()"/>
        </div>
        <div class="mt-1 small" id="pay-change"></div>
      </div>
      <div class="mb-2">
        <label class="form-label small fw-semibold">備註</label>
        <input id="pay-remark" type="text" class="form-control form-control-sm" placeholder="選填"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-success fw-bold" onclick="confirmCheckout()">

      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body py-2" id="cust-modal-body"
         style="overflow-y:scroll;touch-action:pan-y;-webkit-overflow-scrolling:touch;overscroll-behavior:contain"></div>

      <span class="me-auto fw-bold text-primary fs-5" id="cust-total-price"></span>
      <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-primary btn-sm fw-semibold" onclick="confirmCustomization()">
        <i class="bi bi-cart-plus me-1"></i>加入購物車

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ════════════════════════════════════════════
//  State
// ════════════════════════════════════════════
let TOKEN         = localStorage.getItem('pos_token')         || '';
let REFRESH_TOKEN = localStorage.getItem('pos_refresh_token') || '';
let CURRENT_USER  = localStorage.getItem('pos_user')          || '';
let ALL_PRODUCTS    = [];
let ALL_CATEGORIES  = [];
let ALL_WAREHOUSES  = [];
let ALL_MENUS       = [];
let CURRENT_MENU    = null;   // 目前選擇的菜單物件（null = 全部商品模式）
let CART = [];   // [{item, quantity}]  item 含 name/price/sku/unit/consume_inventory/product_id/item_warehouse_id

// 付款方式（動態從後端載入，初始 fallback）
let _payMethods = [{id:'cash', label:'現金', enabled:true, has_cash:true, sort_order:0}];
// 向下相容舊訂單的 payment_type 顯示
const _PAY_LABELS_LEGACY = {cash:'現金', card:'刷卡', mixed:'混合', online:'線上'};
function _payLabel(id) {
  const m = _payMethods.find(m => m.id === id);
  return m ? m.label : (_PAY_LABELS_LEGACY[id] || id);
}
async function loadPayMethods() {
  const r = await api('GET', '/pos/payment-methods');
  if (r.ok && Array.isArray(r.data.data)) {
    const enabled = r.data.data.filter(m => m.enabled);
    if (enabled.length) _payMethods = enabled;
  }
}

const _bsModal = {};
['modal-payment','modal-history','modal-sale-detail','modal-customization'].forEach(id => {
  _bsModal[id] = new bootstrap.Modal(document.getElementById(id));
});

let _pendingCustItem = null;  // 待客製化的菜單品項

// 時鐘
function startClock() {
  const el = document.getElementById('topbar-clock');
  const tick = () => {
    const now = new Date();
    el.textContent = now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  };
  tick();
  setInterval(tick, 1000);
}


// ════════════════════════════════════════════
//  API helper
// ════════════════════════════════════════════
async function api(method, path, body, _retry = false) {
  const opts = { method, headers: { Authorization: `Bearer ${TOKEN}` } };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(path, opts);
    // Access token 過期且有 refresh token → 自動換發後重試一次
    if (res.status === 401 && REFRESH_TOKEN && !_retry) {
      const refreshed = await _tryRefresh();
      if (refreshed) return api(method, path, body, true);
      doLogout(); return { ok: false, status: 401, data: {} };
    }
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, status: 0, data: {} };
  }
}

/** 用 Refresh Token 換發新 Access Token */
async function _tryRefresh() {
  try {
    const r = await fetch('/auth/refresh', {
      method: 'POST',
      headers: { Authorization: `Bearer ${REFRESH_TOKEN}` },
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.token) {
      TOKEN = j.token;
      localStorage.setItem('pos_token', TOKEN);
      return true;
    }
  } catch (_) {}
  REFRESH_TOKEN = '';
  localStorage.removeItem('pos_refresh_token');
  return false;
}

// ════════════════════════════════════════════
//  Toast
// ════════════════════════════════════════════
function toast(msg, type = '') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ════════════════════════════════════════════
//  Auth
// ════════════════════════════════════════════
async function doLogin() {
  const u        = document.getElementById('login-user').value.trim();
  const p        = document.getElementById('login-pass').value;
  const remember = document.getElementById('pos-remember').checked;
  if (!u || !p) return;
  const r = await api('POST', '/auth/login', { username: u, password: p, remember_me: remember });
  if (r.ok && r.data.token) {
    TOKEN        = r.data.token;
    CURRENT_USER = u;
    localStorage.setItem('pos_token', TOKEN);
    localStorage.setItem('pos_user',  u);
    if (r.data.refresh_token) {
      REFRESH_TOKEN = r.data.refresh_token;
      localStorage.setItem('pos_refresh_token', REFRESH_TOKEN);
    }
    await bootApp();
  } else {
    document.getElementById('login-err').textContent = r.data.message || '登入失敗';
  }
}
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  TOKEN = ''; REFRESH_TOKEN = ''; CURRENT_USER = '';
  ['pos_token','pos_refresh_token','pos_user'].forEach(k => localStorage.removeItem(k));
  location.reload();
}

// ════════════════════════════════════════════
//  Boot
// ════════════════════════════════════════════
async function bootApp() {
  // 驗證 token 是否仍有效
  const me = await api('GET', '/auth/me');
  if (!me.ok) {
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  CURRENT_USER = me.data.username || CURRENT_USER;
  document.getElementById('topbar-user').textContent = `👤 ${CURRENT_USER}`;
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const [pr, cr, wr, mr] = await Promise.all([
    api('GET', '/product/?status=1'),
    api('GET', '/product/category/'),
    api('GET', '/warehouse/'),
    api('GET', '/menu/?status=1'),
  ]);
  ALL_PRODUCTS   = pr.ok  ? (pr.data.data  || []) : [];
  ALL_CATEGORIES = cr.ok  ? (cr.data.data  || []) : [];
  ALL_WAREHOUSES = wr.ok  ? (wr.data.data  || []) : [];
  ALL_MENUS      = mr.ok  ? (mr.data.data  || []) : [];

  // 載入付款方式
  await loadPayMethods();

  // 倉庫下拉
  const sel = document.getElementById('sel-warehouse');
  sel.innerHTML = ALL_WAREHOUSES.map(w =>
    `<option value="${w._id}">${w.name}</option>`).join('');

  // 菜單下拉
  const menuSel = document.getElementById('sel-menu');
  menuSel.innerHTML = '<option value="">全部商品</option>';
  ALL_MENUS.forEach(m =>
    menuSel.insertAdjacentHTML('beforeend', `<option value="${m._id}">${m.name}</option>`));
  // 若有菜單，預設選第一個
  if (ALL_MENUS.length) {
    menuSel.value = ALL_MENUS[0]._id;
    CURRENT_MENU  = ALL_MENUS[0];
  }

  // 分類下拉（根據當前模式填入）
  _rebuildCatSelect();
  renderProducts();
  initScanInput();
  startClock();
  document.getElementById('hist-date').value = new Date().toISOString().slice(0,10);

  // 套用系統預設倉庫
  await _applyDefaultWarehouse();
}

async function _applyDefaultWarehouse() {
  const r = await api('GET', '/settings/');
  if (!r.ok) return;
  const wid = r.data.data?.default_warehouse_id;
  if (wid) {
    const sel = document.getElementById('sel-warehouse');
    if (sel) sel.value = wid;
  }
}

// ════════════════════════════════════════════
//  Menu helper
// ════════════════════════════════════════════
function _rebuildCatSelect() {
  const catSel = document.getElementById('prod-cat');
  catSel.innerHTML = '<option value="">全部分類</option>';
  if (CURRENT_MENU) {
    // 優先使用菜單定義的 categories（依 sort_order 排列，只取啟用）
    const defined = (CURRENT_MENU.categories || [])
      .filter(c => c.status === 1)
      .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
    if (defined.length) {
      defined.forEach(c =>
        catSel.insertAdjacentHTML('beforeend', `<option value="${c.name}">${c.name}</option>`));
    } else {
      // fallback：從品項 category 字串去重
      const cats = [...new Set((CURRENT_MENU.items || [])
        .map(i => i.category).filter(Boolean))].sort();
      cats.forEach(c =>
        catSel.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`));
    }
  } else {
    ALL_CATEGORIES.forEach(c =>
      catSel.insertAdjacentHTML('beforeend', `<option value="${c._id}">${c.name}</option>`));
  }
}

function onMenuChange() {
  const mid = document.getElementById('sel-menu').value;
  CURRENT_MENU = mid ? (ALL_MENUS.find(m => m._id === mid) || null) : null;
  _rebuildCatSelect();
  renderProducts();
}

// ════════════════════════════════════════════
//  Products
// ════════════════════════════════════════════
function renderProducts() {
  if (CURRENT_MENU) {
    _renderMenuItems();
    return;
  }
  const kw  = document.getElementById('prod-search').value.toLowerCase();
  const cat = document.getElementById('prod-cat').value;
  const list = ALL_PRODUCTS.filter(p => {
    if (cat && p.category_id !== cat) return false;
    if (kw && !p.name.toLowerCase().includes(kw) && !p.sku.toLowerCase().includes(kw)) return false;
    return true;
  });
  const grid = document.getElementById('product-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="text-muted text-center py-4 col-span-full">無符合商品</div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="prod-card" onclick="addToCart('${p._id}')">
      <div class="pc-name">${p.name}</div>
      <div class="pc-sku">${p.sku}</div>
      <div class="pc-price">$${Number(p.sell_price||0).toLocaleString()}</div>
    </div>`).join('');
}

function _renderMenuItems() {
  const kw  = document.getElementById('prod-search').value.toLowerCase();
  const cat = document.getElementById('prod-cat').value;
  const items = (CURRENT_MENU.items || []).filter(i => {
    if (i.status !== 1) return false;
    if (cat && i.category !== cat) return false;
    if (kw && !i.name.toLowerCase().includes(kw)) return false;
    return true;
  }).sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
  const grid = document.getElementById('product-grid');
  if (!items.length) {
    grid.innerHTML = '<div class="text-muted text-center py-4 col-span-full">無符合品項</div>';
    return;
  }
  grid.innerHTML = items.map(i => {
    const invIcon = i.consume_inventory
      ? '<i class="bi bi-box-seam" style="font-size:.65rem;color:#94a3b8" title="消耗庫存"></i>'
      : '<i class="bi bi-ban" style="font-size:.65rem;color:#94a3b8" title="不消耗庫存"></i>';
    return `
    <div class="prod-card" onclick="addMenuItemToCart('${i._id}')">
      <div class="pc-name">${i.name}</div>
      <div class="pc-sku">${i.category || ''} ${invIcon}</div>
      <div class="pc-price">$${Number(i.price||0).toLocaleString()}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════
//  Barcode scan
// ════════════════════════════════════════════
function initScanInput() {
  const inp = document.getElementById('scan-input');
  inp.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    const code = inp.value.trim();
    inp.value = '';
    if (!code) return;
    const r = await api('GET', `/product/barcode/${encodeURIComponent(code)}`);
    if (r.ok) {
      const p = r.data.data;
      _addProductToCart(p);
      toast(`已加入：${p.name}`,'success');
    } else {
      toast('找不到對應商品','danger');
    }
  });
}

// ════════════════════════════════════════════
//  Cart
// ════════════════════════════════════════════

/** 將商品物件（ALL_PRODUCTS 中的）轉成統一購物車 item 格式 */
function _productToCartItem(p) {
  return {
    _id:               p._id,
    name:              p.name,
    sku:               p.sku || '',
    price:             p.sell_price,
    unit:              p.unit || '個',
    consume_inventory: true,
    product_id:        p._id,
    item_warehouse_id: null,
  };
}

/** 將菜單品項轉成統一購物車 item 格式 */
function _menuItemToCartItem(i) {
  return {
    _id:               i._id,
    name:              i.name,
    sku:               '',
    price:             i.price,
    unit:              '份',
    consume_inventory: !!i.consume_inventory,
    linked_products:   i.linked_products  || [],
    // 向下相容：仍保留舊欄位供 fallback
    consume_qty:       i.consume_qty      || 1,
    product_id:        i.product_id       || null,
    item_warehouse_id: i.warehouse_id     || null,
  };
}

function _addProductToCart(p) {
  const cartItem = _productToCartItem(p);
  const existing = CART.find(c => c.item._id === p._id);
  if (existing) existing.quantity++;
  else CART.push({ item: cartItem, quantity: 1 });
  renderCart();
}

function addToCart(pid) {
  const p = ALL_PRODUCTS.find(x => x._id === pid);
  if (!p) return;
  _addProductToCart(p);
}

function addMenuItemToCart(iid) {
  if (!CURRENT_MENU) return;
  const menuItem = (CURRENT_MENU.items || []).find(x => x._id === iid);
  if (!menuItem) return;
  // 專屬客製化 + 套用的選項組模組，只要任一有選項就開 modal
  const allGroups = [...(menuItem.customizations || []), ...(menuItem.applied_groups || [])];
  if (allGroups.length > 0) {
    openCustomizationModal(menuItem);
  } else {
    _doAddMenuItemToCart(menuItem, [], 0);
  }
}

function openCustomizationModal(menuItem) {
  _pendingCustItem = menuItem;
  document.getElementById('cust-item-name').textContent = menuItem.name;

  // 合併品項專屬客製化 + 套用的選項組模組
  const allGroups = [...(menuItem.customizations || []), ...(menuItem.applied_groups || [])];

  const body = document.getElementById('cust-modal-body');
  body.innerHTML = allGroups.map(grp => {
    const inputType = grp.type === 'multiple' ? 'checkbox' : 'radio';
    const reqMark   = grp.required ? ' <span class="text-danger">*</span>' : '';
    const choices   = (grp.choices || []).map(ch => {
      const extra = ch.extra_price > 0
        ? ` <span class="text-muted" style="font-size:.75rem">+$${ch.extra_price}</span>` : '';
      const defChk = ch.is_default ? ' checked' : '';
      return `<div class="form-check">
        <input class="form-check-input cust-inp" type="${inputType}"
               name="cg_${grp._id}" id="ch_${ch._id}"
               data-group-id="${grp._id}" data-choice-id="${ch._id}"
               data-extra-price="${ch.extra_price || 0}"
               onchange="updateCustTotal()"${defChk}/>
        <label class="form-check-label small" for="ch_${ch._id}">${ch.name}${extra}</label>
      </div>`;
    }).join('');
    return `<div class="mb-3">
      <div class="fw-semibold small mb-1">${grp.name}${reqMark}</div>
      ${choices}
    </div>`;
  }).join('');

  updateCustTotal();
  _bsModal['modal-customization'].show();
}

function updateCustTotal() {
  if (!_pendingCustItem) return;
  let extra = 0;
  document.querySelectorAll('#cust-modal-body .cust-inp:checked').forEach(el => {
    extra += parseFloat(el.dataset.extraPrice) || 0;
  });
  document.getElementById('cust-total-price').textContent =
    `$${(_pendingCustItem.price + extra).toLocaleString()}`;
}

function confirmCustomization() {
  const menuItem = _pendingCustItem;
  if (!menuItem) return;

  // 收集已勾選
  const groupSel = {};   // groupId → [choiceId, …]
  document.querySelectorAll('#cust-modal-body .cust-inp:checked').forEach(el => {
    const gid = el.dataset.groupId;
    (groupSel[gid] = groupSel[gid] || []).push(el.dataset.choiceId);
  });

  // 合併品項專屬客製化 + 套用的選項組模組
  const allGroups = [...(menuItem.customizations || []), ...(menuItem.applied_groups || [])];

  // 驗證必選
  for (const grp of allGroups) {
    if (grp.required && !(groupSel[grp._id] || []).length) {
      toast(`請選擇「${grp.name}」`, 'danger');
      return;
    }
  }

  // 組裝 customizations_selected（從 menuItem 資料取名稱/價格，不從 DOM 讀）
  let extraPrice = 0;
  const custSelected = [];
  for (const grp of allGroups) {
    const ids = groupSel[grp._id] || [];
    if (!ids.length) continue;
    const choices = ids.map(cid => {
      const ch = (grp.choices || []).find(x => x._id === cid);
      return ch ? { choice_id: cid, name: ch.name, extra_price: ch.extra_price || 0 } : null;
    }).filter(Boolean);
    if (!choices.length) continue;
    custSelected.push({ group_id: grp._id, group_name: grp.name, type: grp.type, choices });
    extraPrice += choices.reduce((s, c) => s + c.extra_price, 0);
  }

  _bsModal['modal-customization'].hide();
  _doAddMenuItemToCart(menuItem, custSelected, extraPrice);
  _pendingCustItem = null;
}

function _doAddMenuItemToCart(menuItem, custSelected, extraPrice) {
  const baseItem   = _menuItemToCartItem(menuItem);
  const finalPrice = baseItem.price + extraPrice;

  // 相同品項 + 相同客製組合 → 合併數量
  const custKey = custSelected.length
    ? custSelected.map(g =>
        g.group_id + ':' + g.choices.map(c => c.choice_id).sort().join(',')
      ).sort().join(';')
    : '';
  const cartId = menuItem._id + (custKey ? '|' + custKey : '');

  const cartItem = { ...baseItem, _id: cartId, price: finalPrice,
                     customizations_selected: custSelected };
  const existing = CART.find(c => c.item._id === cartId);
  if (existing) existing.quantity++;
  else CART.push({ item: cartItem, quantity: 1 });
  renderCart();
}

function changeQty(iid, delta) {
  const idx = CART.findIndex(c => c.item._id === iid);
  if (idx === -1) return;
  CART[idx].quantity += delta;
  if (CART[idx].quantity <= 0) CART.splice(idx, 1);
  renderCart();
}

function removeFromCart(iid) {
  CART = CART.filter(c => c.item._id !== iid);
  renderCart();
}

function clearCart() {
  CART = [];
  document.getElementById('cf-discount').value = 0;
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const empty     = document.getElementById('cart-empty');
  const badge     = document.getElementById('cart-count');
  const totalItems = CART.reduce((s,c) => s + c.quantity, 0);

  if (!CART.length) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    badge.style.display = 'none';
    updateTotal();
    return;
  }
  empty.classList.add('hidden');
  badge.style.display = 'inline';
  badge.textContent = totalItems;

  container.innerHTML = CART.map(c => {
    const invBadge = c.item.consume_inventory
      ? '' : '<span style="font-size:.65rem;color:#94a3b8;margin-left:4px">不扣庫存</span>';
    const custHtml = (c.item.customizations_selected || []).length
      ? `<div class="cart-cust">${
          c.item.customizations_selected.map(g =>
            g.choices.map(ch =>
              ch.extra_price > 0 ? `${ch.name} +$${ch.extra_price}` : ch.name
            ).join('、')
          ).join('；')
        }</div>`
      : '';
    return `
    <div class="cart-row">
      <div class="cart-info">
        <div class="cart-name">${c.item.name}${invBadge}</div>
        <div class="cart-sku">${c.item.sku || ''}</div>
        ${custHtml}
      </div>
      <div class="cart-qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${c.item._id}',-1)">−</button>
        <span class="qty-val">${c.quantity}</span>
        <button class="qty-btn" onclick="changeQty('${c.item._id}',1)">+</button>
      </div>
      <div class="cart-price">$${(c.item.price * c.quantity).toLocaleString()}</div>
      <span class="cart-del" onclick="removeFromCart('${c.item._id}')"><i class="bi bi-x-lg"></i></span>
    </div>`;
  }).join('');
  updateTotal();
}

function updateTotal() {
  const subtotal  = CART.reduce((s,c) => s + c.item.price * c.quantity, 0);
  const discount  = parseFloat(document.getElementById('cf-discount').value) || 0;
  const total     = Math.max(subtotal - discount, 0);
  document.getElementById('cf-subtotal').textContent = `$${subtotal.toLocaleString()}`;
  document.getElementById('cf-total').textContent    = `$${total.toLocaleString()}`;
}

// ════════════════════════════════════════════
//  Payment
// ════════════════════════════════════════════
let _payType = 'cash';

function _currentPayMethod() {
  return _payMethods.find(m => m.id === _payType) || {has_cash: _payType === 'cash'};
}

function _renderPayButtons() {
  const wrap = document.getElementById('pay-type-btns');
  wrap.innerHTML = _payMethods.map(m =>
    `<button class="btn btn-outline-secondary${m.id === _payType ? ' active' : ''}"
             data-type="${m.id}" onclick="setPayType('${m.id}')">${m.label}</button>`
  ).join('');
}

function openPayment() {
  if (!CART.length) return toast('購物車為空','danger');
  const total = parseFloat(document.getElementById('cf-total').textContent.replace('$','').replace(/,/g,''));
  document.getElementById('pay-total').textContent = `$${total.toLocaleString()}`;
  document.getElementById('pay-remark').value = '';
  _renderPayButtons();
  // 預設選第一個付款方式
  const first = _payMethods[0]?.id || 'cash';
  setPayType(first);
  _bsModal['modal-payment'].show();
}

function setPayType(type) {
  _payType = type;
  document.querySelectorAll('#pay-type-btns button').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  const hasCash = _currentPayMethod().has_cash;
  const cashWrap = document.getElementById('pay-cash-wrap');
  cashWrap.style.display = hasCash ? '' : 'none';
  if (hasCash) {
    const total = parseFloat(document.getElementById('pay-total').textContent.replace('$','').replace(/,/g,''));
    document.getElementById('pay-cash').value = total;
  }
  calcChange();
}

function calcChange() {
  const el = document.getElementById('pay-change');
  if (!_currentPayMethod().has_cash) { el.textContent = ''; return; }
  const total  = parseFloat(document.getElementById('pay-total').textContent.replace('$','').replace(/,/g,''));
  const cash   = parseFloat(document.getElementById('pay-cash').value) || 0;
  const change = cash - total;
  if (cash > 0) {
    el.textContent  = change >= 0 ? `找零 $${change.toLocaleString()}` : `不足 $${Math.abs(change).toLocaleString()}`;
    el.className    = change >= 0 ? 'mt-1 small text-success' : 'mt-1 small text-danger';
  } else {
    el.textContent = '';
  }
}

async function confirmCheckout() {
  const warehouse_id = document.getElementById('sel-warehouse').value;
  if (!warehouse_id) return toast('請先選擇倉庫','danger');
  const total    = parseFloat(document.getElementById('pay-total').textContent.replace('$','').replace(/,/g,''));
  const discount = parseFloat(document.getElementById('cf-discount').value) || 0;
  const hasCash  = _currentPayMethod().has_cash;
  const cash_amt = hasCash ? (parseFloat(document.getElementById('pay-cash').value) || 0) : 0;

  if (hasCash && cash_amt < total) return toast('收款金額不足','danger');

  const items = CART.map(c => {
    const entry = {
      product_id:        c.item.product_id,
      product_name:      c.item.name,
      product_sku:       c.item.sku,
      unit:              c.item.unit,
      quantity:          c.quantity,
      unit_price:        c.item.price,
      consume_inventory: c.item.consume_inventory,
      consume_qty:       c.item.consume_qty || 1,
      linked_products:        c.item.linked_products || [],
      customizations_selected: c.item.customizations_selected || [],
    };
    if (c.item.item_warehouse_id) entry.warehouse_id = c.item.item_warehouse_id;
    return entry;
  });

  const r = await api('POST', '/pos/sale', {
    warehouse_id,
    items,
    payment: { type: _payType, cash_amount: cash_amt, card_amount: 0 },
    discount,
    remark: document.getElementById('pay-remark').value.trim(),
  });

  if (r.ok) {
    _bsModal['modal-payment'].hide();
    toast(`結帳成功 ${r.data.order.order_no}`, 'success');
    printReceipt(r.data.order);
    clearCart();
  } else {
    toast(r.data.message || '結帳失敗', 'danger');
  }
}

// ════════════════════════════════════════════
//  Receipt print
// ════════════════════════════════════════════
function printReceipt(order) {
  const lines = order.items.map(i =>
    `${i.product_name.padEnd(12)} × ${i.quantity}  $${i.subtotal.toLocaleString()}`
  ).join('\n');
  const payMethod = _payMethods.find(m => m.id === order.payment_type);
  const payName   = _payLabel(order.payment_type);
  const payInfo   = (payMethod?.has_cash || order.payment_type === 'cash')
    ? `${payName} $${order.cash_amount.toLocaleString()}  找零 $${order.change_amount.toLocaleString()}`
    : payName;

  document.getElementById('receipt-print').innerHTML = `<pre>
========================================
  {{ admin_title }}
========================================
單號：${order.order_no}
時間：${new Date(order.created_at).toLocaleString('zh-TW')}
收銀：${order.cashier}
----------------------------------------
${lines}
----------------------------------------
小計      $${order.subtotal.toLocaleString()}
折扣     -$${order.discount.toLocaleString()}
合計      $${order.total_amount.toLocaleString()}
${payInfo}
========================================
        謝謝光臨！
========================================
</pre>`;
  window.print();
}

// ════════════════════════════════════════════
//  Sales History
// ════════════════════════════════════════════
async function openSalesHistory() {
  await loadHistory();
  _bsModal['modal-history'].show();
}

async function loadHistory() {
  const date = document.getElementById('hist-date').value;
  const r = await api('GET', `/pos/sales?date_from=${date}&date_to=${date}`);
  if (!r.ok) return toast('載入失敗','danger');
  const orders = r.data.data || [];
  const total  = orders.reduce((s,o) => s + o.total_amount, 0);
  document.getElementById('hist-summary').textContent =
    `共 ${orders.length} 筆 · 合計 $${total.toLocaleString()}`;
  const tbody = document.querySelector('#tbl-history tbody');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">無記錄</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td class="fw-semibold small">${o.order_no}</td>
      <td class="small text-muted">${new Date(o.created_at).toLocaleTimeString('zh-TW')}</td>
      <td class="text-primary fw-bold">$${o.total_amount.toLocaleString()}</td>
      <td class="text-muted small">${o.discount > 0 ? '-$'+o.discount : '-'}</td>
      <td class="small">${_payLabel(o.payment_type)}</td>
      <td>${o.status==='completed'
        ? '<span class="badge bg-success">完成</span>'
        : '<span class="badge bg-secondary">已退款</span>'}</td>
      <td>
        <button class="btn btn-xs btn-outline-secondary py-0 px-1" onclick="openSaleDetail('${o._id}')">
          <i class="bi bi-eye"></i>
        </button>
      </td>
    </tr>`).join('');
}

async function openSaleDetail(sid) {
  const r = await api('GET', `/pos/sales/${sid}`);
  if (!r.ok) return toast('載入失敗','danger');
  const o = r.data.data;
  document.getElementById('sale-detail-title').textContent = o.order_no;
  const rows = o.items.map(i => `
    <tr>
      <td>${i.product_name}<br><small class="text-muted">${i.product_sku}</small></td>
      <td class="text-end">${i.quantity}</td>
      <td class="text-end">$${i.unit_price.toLocaleString()}</td>
      <td class="text-end fw-bold">$${i.subtotal.toLocaleString()}</td>
    </tr>`).join('');
  document.getElementById('sale-detail-body').innerHTML = `
    <table class="table table-sm mb-3">
      <thead><tr><th>商品</th><th class="text-end">數量</th><th class="text-end">單價</th><th class="text-end">小計</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="small">
      <div class="d-flex justify-content-between"><span class="text-muted">小計</span><span>$${o.subtotal.toLocaleString()}</span></div>
      <div class="d-flex justify-content-between"><span class="text-muted">折扣</span><span>-$${(o.discount||0).toLocaleString()}</span></div>
      <div class="d-flex justify-content-between fw-bold border-top pt-1 mt-1"><span>合計</span><span class="text-primary">$${o.total_amount.toLocaleString()}</span></div>
    </div>
    <hr/>
    <div class="small text-muted">
      付款：${_payLabel(o.payment_type)}
      ${o.cash_amount > 0 ? ` · 收現 $${(o.cash_amount).toLocaleString()} · 找零 $${(o.change_amount||0).toLocaleString()}` : ''}
    </div>
    <div class="small text-muted">倉庫：${o.warehouse_name} · 收銀：${o.cashier}</div>
    ${o.remark ? `<div class="small text-muted">備註：${o.remark}</div>` : ''}
  `;
  const footer = document.getElementById('sale-detail-footer');
  footer.innerHTML = o.status === 'completed'
    ? `<button class="btn btn-sm btn-outline-danger" onclick="doRefund('${o._id}')">退款</button>
       <button class="btn btn-sm btn-outline-secondary ms-1" onclick="printReceipt(${JSON.stringify(o).replace(/"/g,'&quot;')})"><i class="bi bi-printer"></i> 重印</button>`
    : '<span class="badge bg-secondary">已退款</span>';
  _bsModal['modal-sale-detail'].show();
}

async function doRefund(sid) {
  const reason = prompt('退款原因（選填）') ?? '';
  if (reason === null) return;
  const r = await api('POST', `/pos/sales/${sid}/refund`, { reason });
  if (r.ok) {
    toast('退款成功','success');
    _bsModal['modal-sale-detail'].hide();
    loadHistory();
  } else {
    toast(r.data.message || '退款失敗','danger');
  }
}

// ════════════════════════════════════════════
//  Orientation lock（橫向鎖定）
// ════════════════════════════════════════════
(function lockOrientation() {
  // Screen Orientation API（Chrome Android、部分 iOS PWA）
  const so = screen.orientation || screen.mozOrientation || screen.msOrientation;
  if (so && so.lock) {
    so.lock('landscape').catch(() => {/* 無法鎖定時靜默失敗，CSS fallback 生效 */});
  }
})();

// ════════════════════════════════════════════
//  Lock scroll（阻止頁面整體滑動，只允許指定可滾動區塊）
// ════════════════════════════════════════════
const SCROLLABLE = ['product-grid', 'cart-items', 'cat-tabs'];
document.addEventListener('touchmove', e => {
  const el = e.target.closest(SCROLLABLE.map(id => '#' + id).join(','));
  if (!el) { e.preventDefault(); return; }
  // 已到頂/底時也阻止繼續拉動（避免觸發 bounce）
  const atTop    = el.scrollTop === 0;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
  const dy = e.touches[0].clientY - (el._lastY ?? e.touches[0].clientY);
  el._lastY = e.touches[0].clientY;
  if ((atTop && dy > 0) || (atBottom && dy < 0)) e.preventDefault();
}, { passive: false });

document.addEventListener('touchstart', e => {
  const el = e.target.closest(SCROLLABLE.map(id => '#' + id).join(','));
  if (el) el._lastY = e.touches[0].clientY;
}, { passive: true });

// ════════════════════════════════════════════
//  Viewport height fix（iOS Safari 100vh 包含工具列，用 JS 精確設定）
//  優先使用 visualViewport.height（iOS Safari 最準確的可見區域高度）
//  requestAnimationFrame 確保地址列渲染完成後再量測
// ════════════════════════════════════════════
(function initVH() {
  const set = () => {
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--viewport-h', Math.floor(h) + 'px');
  };
  set();
  requestAnimationFrame(set);  // 瀏覽器工具列渲染完成後重算
  window.addEventListener('resize', set, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', set, { passive: true });
  }
})();

// ════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════
(async () => {
  if (TOKEN) {
    await bootApp();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
    if (CURRENT_USER) document.getElementById('login-user').value = CURRENT_USER;
  }
})();

// iOS Safari：防止 touchmove 冒泡到 Bootstrap modal 的 document handler
// 使 modal-body 內可以正常用手指上下滑動
document.getElementById('cust-modal-body').addEventListener('touchmove', function(e) {
  e.stopPropagation();
}, { passive: true });
</script>
