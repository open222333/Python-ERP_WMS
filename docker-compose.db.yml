services:
  mongo:
    image: mongo:7
    hostname: wms-mongo
    volumes:
      - ./docker/database/mongo:/data/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    hostname: wms-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "64mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - ./docker/database/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 32m
