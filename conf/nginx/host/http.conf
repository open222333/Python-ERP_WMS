# ============================================================
# 主機 nginx 設定 — 純 HTTP
# 適用：本機開發、IP 直連、或由 Cloudflare 在外層處理 HTTPS
#
# 包含兩個虛擬主機：
#   admin.example.com — 後台管理完整入口（所有 API + Vue SPA）
#   order.example.com — 顧客點餐專用（僅 /customer-order/ + Vue SPA）
#                       後台路由一律 403，掃碼顧客無從得知後台入口
#
# ── 使用方式 ─────────────────────────────────────────────────
#   1. 搜尋取代：
#        admin.example.com → 後台管理域名（或 _ 接受所有請求）
#        order.example.com → 顧客點餐域名
#        /opt/wms          → 專案根目錄（含 frontend-dist/）
#   2. 複製至 nginx 設定目錄：
#      sudo cp conf/nginx/host/http.conf /etc/nginx/sites-available/flask-app
#      sudo ln -sf /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled/flask-app
#      sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream flask_app {
    server 127.0.0.1:5000;   # Flask 容器 port（docker-compose 需 ports: "127.0.0.1:5000:5000"）
}

# ════════════════════════════════════════════════════════════
# 後台管理域名（admin.example.com）
# ════════════════════════════════════════════════════════════
server {
    listen      80;
    server_name admin.example.com;

    client_max_body_size 20M;

    access_log  /var/log/nginx/$server_name-access.log;   # $server_name = nginx 執行期變數，自動帶入域名
    error_log   /var/log/nginx/admin.example.com-error.log;

    # ── SSE 長連線（廚房看板 / 顧客點餐即時推播）─────────────
    location ~* ^/customer-order/stream {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout  60s;
        add_header         X-Accel-Buffering no;
    }

    # ── Flask API（路徑帶 trailing slash，不攔截同名 SPA 路由）──
    location ~* ^/(auth|user|log|product|warehouse|inventory|inbound|outbound|analytics|pos|delivery|menu|settings|customer-order|quick-io|invoice|docs|apidocs)/ {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout    120s;
    }

    location = /apidocs {
        return 301 /apidocs/;
    }

    # ── Vue SPA 靜態檔案 ─────────────────────────────────────
    root  /opt/wms/frontend-dist;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}

# ════════════════════════════════════════════════════════════
# 顧客點餐域名（order.example.com）
# 僅開放 /customer-order/，後台路由一律 403
# ════════════════════════════════════════════════════════════
server {
    listen      80;
    server_name order.example.com;

    client_max_body_size 5M;

    access_log  /var/log/nginx/$server_name-access.log;
    error_log   /var/log/nginx/order.example.com-error.log;

    # ── 封鎖所有後台 API ────────────────────────────────────
    location ~* ^/(auth|user|log|product|warehouse|inventory|inbound|outbound|analytics|pos|delivery|menu|settings|quick-io|invoice|docs|apidocs)/ {
        return 403;
    }
    location = /apidocs {
        return 403;
    }

    # ── SSE 長連線（顧客點餐即時推播）──────────────────────────
    location ~* ^/customer-order/stream {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout  60s;
        add_header         X-Accel-Buffering no;
    }

    # ── 顧客點餐 API（唯一開放的後端路由）──────────────────
    location ~* ^/customer-order/ {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout    120s;
    }

    # ── Vue SPA 靜態檔案 ─────────────────────────────────────
    root  /opt/wms/frontend-dist;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}
