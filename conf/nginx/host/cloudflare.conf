# ============================================================
# 主機 nginx 設定 — Cloudflare SSL（Origin CA）
# 適用：域名透過 Cloudflare Proxy，SSL/TLS 模式設為 Full (Strict)
#
# 包含兩個虛擬主機：
#   admin.example.com — 後台管理完整入口（所有 API + Vue SPA）
#   order.example.com — 顧客點餐專用（僅 /customer-order/ + Vue SPA）
#                       後台路由一律 403，掃碼顧客無從得知後台入口
#
# ── 前置作業 ─────────────────────────────────────────────────
#   1. Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
#      （萬用字元憑證 *.example.com 可讓兩個域名共用同一張）
#   2. mkdir -p /etc/ssl/cloudflare
#      nano /etc/ssl/cloudflare/origin.pem  ← 貼上 Origin Certificate
#      nano /etc/ssl/cloudflare/origin.key  ← 貼上 Private Key
#      chmod 600 /etc/ssl/cloudflare/origin.key
#
# ── 使用方式 ─────────────────────────────────────────────────
#   1. 搜尋取代：
#        admin.example.com → 後台管理域名
#        order.example.com → 顧客點餐域名
#        /opt/wms          → 專案根目錄（含 frontend-dist/）
#   2. 複製至 nginx 設定目錄：
#      sudo cp conf/nginx/host/cloudflare.conf /etc/nginx/sites-available/flask-app
#      sudo ln -sf /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled/flask-app
#      sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream flask_app {
    server 127.0.0.1:5000;
}

# ════════════════════════════════════════════════════════════
# 後台管理域名（admin.example.com）
# ════════════════════════════════════════════════════════════

# HTTP → HTTPS 強制導向
server {
    listen      80;
    server_name admin.example.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS（Cloudflare Origin CA）
server {
    listen      443 ssl;
    server_name admin.example.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    client_max_body_size 20M;

    access_log  /var/log/nginx/$server_name-access.log;
    error_log   /var/log/nginx/admin.example.com-error.log;

    # ── 還原 Cloudflare 真實訪客 IP ─────────────────────────
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;
    real_ip_header    CF-Connecting-IP;

    # ── Flask API ─────────────────────────────────────────────
    location ~* ^/(auth|user|log|product|warehouse|inventory|inbound|outbound|analytics|pos|delivery|menu|settings|customer-order|quick-io|invoice|docs|apidocs)/ {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout    120s;
    }

    location = /apidocs {
        return 301 /apidocs/;
    }

    # ── Vue SPA 靜態檔案 ─────────────────────────────────────
    root  /opt/wms/frontend-dist;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}

# ════════════════════════════════════════════════════════════
# 顧客點餐域名（order.example.com）
# 僅開放 /customer-order/，後台路由一律 403
# ════════════════════════════════════════════════════════════

# HTTP → HTTPS 強制導向
server {
    listen      80;
    server_name order.example.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS（Cloudflare Origin CA）
server {
    listen      443 ssl;
    server_name order.example.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    client_max_body_size 5M;

    access_log  /var/log/nginx/$server_name-access.log;
    error_log   /var/log/nginx/order.example.com-error.log;

    # ── 還原 Cloudflare 真實訪客 IP ─────────────────────────
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;
    real_ip_header    CF-Connecting-IP;

    # ── 封鎖所有後台 API ────────────────────────────────────
    location ~* ^/(auth|user|log|product|warehouse|inventory|inbound|outbound|analytics|pos|delivery|menu|settings|quick-io|invoice|docs|apidocs)/ {
        return 403;
    }
    location = /apidocs {
        return 403;
    }

    # ── 顧客點餐 API（唯一開放的後端路由）──────────────────
    location ~* ^/customer-order/ {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout    120s;
    }

    # ── Vue SPA 靜態檔案 ─────────────────────────────────────
    root  /opt/wms/frontend-dist;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}
